<body>

<h1>MUBARAK ABJAD SHAIKH</h1>
<p>Contact: habibmubarakmohammed@gmail.com</p>

<input id="name" placeholder="Enter Name">
<input id="mother" placeholder="Mother Name">

<button onclick="calculate()">Calculate</button>

<div id="result"></div>

<script>

const abjad = {
ا:1,ب:2,ج:3,د:4,ه:5,و:6,ز:7,ح:8,ط:9,
ي:10,ك:20,ل:30,م:40,ن:50,س:60,ع:70,
ف:80,ص:90,ق:100,ر:200,ش:300,ت:400,
ث:500,خ:600,ذ:700,ض:800,ظ:900,غ:1000
};

const englishMap = {
a:"ا", b:"ب", c:"ك", d:"د", e:"ا",
f:"ف", g:"ج", h:"ه", i:"ي", j:"ج",
k:"ك", l:"ل", m:"م", n:"ن", o:"و",
p:"ب", q:"ق", r:"ر", s:"س", t:"ت",
u:"و", v:"ف", w:"و", x:"كس", y:"ي", z:"ز"
};

function convertEnglishToArabic(text){
 let result="";
 for(let ch of text.toLowerCase()){
   result += englishMap[ch] || "";
 }
 return result;
}

function calcWord(word){
 if(/[a-zA-Z]/.test(word)){
   word = convertEnglishToArabic(word);
 }
 let sum=0;
 for(let ch of word){
   sum += abjad[ch] || 0;
 }
 return sum;
}

function calculate(){
 let nameVal = calcWord(document.getElementById("name").value);
 let motherVal = calcWord(document.getElementById("mother").value);
 let combined = nameVal + motherVal;

 document.getElementById("result").innerHTML = `
 <div>Name Value: ${nameVal}</div>
 <div>Mother Value: ${motherVal}</div>
 <div>Combined Value: ${combined}</div>
 <div>🔒 Advanced Interpretation Locked</div>
 <div>Contact: habibmubarakmohammed@gmail.com</div>`;
}

</script>
