DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUBARAK ABJAD SHAIKH - Version 1</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;margin:0;padding:20px}
.container{max-width:900px;margin:auto}
input,button{padding:10px;margin:5px;width:100%}
.card{background:#222;padding:15px;border-radius:10px;margin-top:15px}
</style>
</head>
<body>
<div class="container">
<h1>MUBARAK ABJAD SHAIKH</h1>

<input id="name" placeholder="Enter Name">
<input id="mother" placeholder="Enter Mother Name">

<button onclick="calculate()">Calculate</button>
<button onclick="saveResult()">Save Result</button>
<button onclick="window.print()">Print</button>

<div id="result" class="card"></div>
<div id="history" class="card"></div>
</div>

<script>
const abjad={
'ا':1,'ب':2,'ج':3,'د':4,'ه':5,'و':6,'ز':7,'ح':8,'ط':9,
'ي':10,'ك':20,'ل':30,'م':40,'ن':50,'س':60,'ع':70,
'ف':80,'ص':90,'ق':100,'ر':200,'ش':300,'ت':400,
'ث':500,'خ':600,'ذ':700,'ض':800,'ظ':900,'غ':1000
};

function calcWord(word){
 let sum=0;
 for(let c of word){ sum += abjad[c] || 0; }
 return sum;
}

function calculate(){
 let n=document.getElementById('name').value;
 let m=document.getElementById('mother').value;
 let total=calcWord(n)+calcWord(m);

 document.getElementById('result').innerHTML=
 '<h3>Result</h3>'+
 '<p>Name Value: '+calcWord(n)+'</p>'+
 '<p>Mother Value: '+calcWord(m)+'</p>'+
 '<p>Total: '+total+'</p>';
}

function saveResult(){
 let data=document.getElementById('result').innerText;
 localStorage.setItem('abjad_last',data);
 loadHistory();
}

function loadHistory(){
 document.getElementById('history').innerHTML =
 '<h3>Saved Result</h3><pre>' +
 (localStorage.getItem('abjad_last')||'No saved result') +
 '</pre>';
}

loadHistory();
</script>
</body>
</html>
